live_config_reload = true

[env]
TERM = "xterm-256color"

[window]
startup_mode = "Windowed"
dynamic_title = true
decorations_theme_variant = "Dark"
decorations = "Full"
opacity = 0.92

[window.padding]
x = 12
y = 12

[scrolling]
history = 10000
multiplier = 3

[font]
normal = { family = "JetBrains Mono", style = "Regular" }
bold = { family = "JetBrains Mono", style = "Bold" }
italic = { family = "JetBrains Mono", style = "Italic" }
bold_italic = { family = "JetBrains Mono", style = "Bold Italic" }
size = 11.5

[cursor]
style = { shape = "Beam" }
unfocused_hollow = true
thickness = 0.15

[mouse]
hide_when_typing = true

[colors.primary]
background = "#07040e"
foreground = "#eadfff"

[colors.cursor]
text = "#07040e"
cursor = "#c88cff"

[colors.selection]
text = "#07040e"
background = "#c88cff"

[colors.normal]
black = "#12091d"
red = "#c2578f"
green = "#7d6ee7"
yellow = "#d9b2ff"
blue = "#8c6cff"
magenta = "#b973ff"
cyan = "#8fe1ff"
white = "#eadfff"

[colors.bright]
black = "#4f3a69"
red = "#f08db9"
green = "#a79bff"
yellow = "#edd7ff"
blue = "#baa4ff"
magenta = "#d4a4ff"
cyan = "#b5efff"
white = "#ffffff"
